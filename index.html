<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Update</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #00ff66;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .terminal {
      width: 90%;
      max-width: 900px;
      border: 2px solid #00ff66;
      padding: 30px;
      box-shadow: 0 0 20px #00ff66;
      background: rgba(0, 0, 0, 0.9);
      animation: flicker 1.5s infinite alternate;
    }

    .title {
      font-size: 28px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ff66;
    }

    .text {
      font-size: 18px;
      line-height: 1.8;
      white-space: pre-line;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    @keyframes flicker {
      from {
        opacity: 0.95;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div class="terminal">
    <div class="title">
      [ SYSTEM STATUS ]
    </div>

    <div class="text">
> Benayas Leulseged Software Company

> TEMPORARILY STOPPED...

> HIGH UPDATING PROGRESS DETECTED...

> SYSTEM REBUILD IN PROCESS...

> PLEASE WAIT UNTIL NEXT ACTIVATION<span class="blink">_</span>
    </div>
  </div>

</body>
</html>
